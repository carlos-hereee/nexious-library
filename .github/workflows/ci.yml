name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # Advisory for now: the repo carries pre-existing lint debt (test files, stories,
      # ThemeMenu, etc.). Surfaced here without failing the build; burn it down over time,
      # then drop continue-on-error to make lint a hard gate.
      - run: npm run lint
        continue-on-error: true
      - run: npx tsc --noEmit
      - run: npm test
